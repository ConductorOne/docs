name: Connector Digest

on:
  schedule:
    - cron: '0 9 * * *'  # 9am UTC = 5am ET
  workflow_dispatch:      # allow manual runs from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore snapshot
        uses: actions/cache@v4
        with:
          path: connector-digest/snapshot.json
          key: connector-snapshot-${{ github.run_id }}
          restore-keys: |
            connector-snapshot-

      - name: Run digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CONNECTOR_DIGEST_SLACK_WEBHOOK }}
        run: python3 connector-digest/digest.py
